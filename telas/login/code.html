<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secure Access Login - MeetingFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f8fafc",
                        "accent-blur": "#e2e8f0",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
        }
        .bg-blur-blobs {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(19, 91, 236, 0.08) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(19, 91, 236, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(19, 91, 236, 0.08) 0, transparent 50%),
                radial-gradient(at 0% 100%, rgba(19, 91, 236, 0.05) 0, transparent 50%);
        }
        .input-focus-ring {
            @apply focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 outline-none;
        }
    </style>
</head>
<body class="bg-blur-blobs min-h-screen flex items-center justify-center p-6 antialiased">
<div class="w-full max-w-md relative">
<div class="absolute -top-12 -left-12 w-24 h-24 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-12 -right-12 w-32 h-32 bg-primary/10 rounded-full blur-3xl"></div>
<div class="glass-card rounded-2xl p-10 relative overflow-hidden">
<div class="flex flex-col items-center mb-10">
<div class="bg-primary size-10 rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/25 mb-4">
<span class="material-symbols-outlined text-2xl font-bold">diamond</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-slate-900">MeetingFlow</h1>
<p class="text-slate-500 text-sm mt-1">Premium Meeting Room Management</p>
</div>
<form class="space-y-5">
<div>
<label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 ml-1" for="email">Work Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="w-full pl-11 pr-4 py-3 bg-white/50 border border-slate-200 rounded-xl text-slate-900 placeholder:text-slate-400 input-focus-ring" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-1.5 ml-1">
<label class="block text-xs font-bold text-slate-500 uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="w-full pl-11 pr-4 py-3 bg-white/50 border border-slate-200 rounded-xl text-slate-900 placeholder:text-slate-400 input-focus-ring" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center gap-2 px-1">
<input class="w-4 h-4 text-primary border-slate-300 rounded focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 font-medium cursor-pointer" for="remember">Stay signed in for 30 days</label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200"></div>
</div>
<div class="relative flex justify-center text-xs font-bold uppercase tracking-widest">
<span class="bg-white/0 px-4 text-slate-400">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-3 px-4 py-3 border border-slate-200 rounded-xl bg-white/40 hover:bg-white hover:border-slate-300 transition-all group">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold text-slate-700">Google</span>
</button>
<button class="flex items-center justify-center gap-3 px-4 py-3 border border-slate-200 rounded-xl bg-white/40 hover:bg-white hover:border-slate-300 transition-all group">
<svg class="w-5 h-5" viewBox="0 0 23 23">
<path d="M1 1h10v10H1z" fill="#f35325"></path>
<path d="M12 1h10v10H12z" fill="#81bc06"></path>
<path d="M1 12h10v10H1z" fill="#05a6f0"></path>
<path d="M12 12h10v10H12z" fill="#ffba08"></path>
</svg>
<span class="text-sm font-semibold text-slate-700">Microsoft</span>
</button>
</div>
<p class="mt-8 text-center text-slate-500 text-sm">
                Don't have an account? 
                <a class="font-bold text-primary hover:underline" href="#">Request access</a>
</p>
</div>
<p class="text-center mt-8 text-slate-400 text-xs font-medium">
            © 2024 MeetingFlow SaaS. All rights reserved.
        </p>
</div>

</body></html>
